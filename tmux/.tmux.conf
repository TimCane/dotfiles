# Tmux config — Gruvbox Dark themed

# Fix scrolling
set -g mouse on
set -g history-limit 50000

# Better terminal colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Reduce escape delay (important for vim/claude)
set -sg escape-time 10

# Gruvbox status bar
set -g status-style "bg=#3c3836,fg=#ebdbb2"
set -g status-left "#[bg=#fe8019,fg=#282828,bold] #S #[bg=#3c3836] "
set -g status-right "#[fg=#928374]%a %b %d #[fg=#ebdbb2]%H:%M "
set -g status-left-length 20
set -g status-right-length 40

# Window status
setw -g window-status-format "#[fg=#928374] #I:#W "
setw -g window-status-current-format "#[bg=#504945,fg=#fabd2f,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#fe8019"

# Message style
set -g message-style "bg=#3c3836,fg=#fabd2f"
