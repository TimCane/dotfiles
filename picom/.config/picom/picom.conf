# Picom config

backend = "glx";
vsync = true;
glx-no-stencil = true;
use-damage = true;

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.6;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'i3-frame'",
    "class_g = 'Rofi'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Fading
fading = true;
fade-in-step = 0.07;
fade-out-step = 0.07;
fade-delta = 6;

# Opacity
inactive-opacity = 1.0;
frame-opacity = 1.0;
opacity-rule = [
    "92:class_g = 'Alacritty' && focused",
    "85:class_g = 'Alacritty' && !focused"
];

# Blur (dual_kawase for frosted glass effect with terminal transparency)
blur-method = "dual_kawase";
blur-strength = 3;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Rofi'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Rounded corners
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# Wintypes
wintypes:
{
    tooltip = { fade = true; shadow = false; opacity = 0.9; };
    dock = { shadow = false; };
    dnd = { shadow = false; };
    popup_menu = { shadow = true; opacity = 0.95; };
    dropdown_menu = { shadow = true; opacity = 0.95; };
};
