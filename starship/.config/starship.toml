# Starship prompt — Gruvbox Dark theme

format = """$directory$git_branch$git_status$cmd_duration$character"""

[directory]
truncation_length = 3
style = "bold #83a598"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold #b8bb26"

[git_status]
format = '([$ahead_behind]($style) )([✗]($style) )'
style = "bold #fb4934"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

[cmd_duration]
min_time = 2000
format = "[⏱ $duration]($style) "
style = "bold #fabd2f"

[character]
success_symbol = "[❯](bold #b8bb26)"
error_symbol = "[❯](bold #fb4934)"

