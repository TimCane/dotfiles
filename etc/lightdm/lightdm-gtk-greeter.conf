[greeter]
theme-name = Gruvbox-Dark
icon-theme-name = Papirus-Dark
cursor-theme-name = Bibata-Modern-Classic
cursor-theme-size = 24
font-name = JetBrainsMono Nerd Font 10
xft-dpi = 96
xft-antialias = true
xft-hintstyle = hintfull
xft-rgba = rgb
background = /usr/share/backgrounds/gruvbox-wallpaper.png
user-background = false
default-user-image =
hide-user-image = true
indicators = ~spacer;~clock;~spacer;~session;~power
clock-format = %a %b %d  %H:%M
position = 50%,center 50%,center
panel-position = top
active-monitor = #cursor
a11y-states = ~reader;~font;~contrast;~keyboard
screen-reader = false
extra-css = /etc/lightdm/lightdm-gtk-greeter.css
