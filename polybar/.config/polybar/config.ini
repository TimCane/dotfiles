;==========================================================
;
;   Polybar Config - Gruvbox Dark Theme
;   JetBrainsMono Nerd Font
;
;==========================================================

; --- Gruvbox Dark Colors ---
[colors]
bg          = #282828
bg-alt      = #3c3836
bg-soft     = #504945
fg          = #ebdbb2
fg-alt      = #a89984
red         = #cc241d
red-bright  = #fb4934
green       = #98971a
green-bright= #b8bb26
yellow      = #d79921
yellow-bright= #fabd2f
blue        = #458588
blue-bright = #83a598
purple      = #b16286
purple-bright= #d3869b
aqua        = #689d6a
aqua-bright = #8ec07c
orange      = #d65d0e
orange-bright= #fe8019
gray        = #928374

; --- Global WM Settings ---
[global/wm]
margin-top    = 0
margin-bottom = 0

; --- Settings ---
[settings]
screenchange-reload = true
pseudo-transparency = false

; ======================
;       BAR CONFIG
; ======================
[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 30
offset-x = 0
offset-y = 0
fixed-center = true
dpi = 0

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 2
line-color = ${colors.orange-bright}

border-size = 0

padding-left = 1
padding-right = 1

module-margin-left = 0
module-margin-right = 0

; --- Fonts ---
font-0 = JetBrainsMono Nerd Font:size=10;3
font-1 = JetBrainsMono Nerd Font:size=14;4
font-2 = JetBrainsMono Nerd Font:size=12;3

; --- Modules Layout ---
modules-left = i3 sep-right
modules-center = date
modules-right = ${env:POLYBAR_MODULES_RIGHT}

; --- Tray ---
tray-position = right
tray-detached = false
tray-maxsize = 18
tray-padding = 4
tray-background = ${colors.bg}

; --- Cursor ---
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3
override-redirect = false

; ======================
;       SEPARATORS
; ======================
[module/sep-right]
type = custom/text
content = "%{T2}%{T-}"
content-foreground = ${colors.bg-alt}
content-background = ${colors.bg}

[module/sep-left]
type = custom/text
content = "%{T2}%{T-}"
content-foreground = ${colors.bg-alt}
content-background = ${colors.bg}

[module/sep-mid]
type = custom/text
content = "%{T2}%{T-}"
content-foreground = ${colors.bg-soft}
content-padding = 0

; ======================
;       i3 WORKSPACES
; ======================
[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

format = <label-state> <label-mode>

; Mode indicator (resize, etc.)
label-mode = %mode%
label-mode-padding = 2
label-mode-foreground = ${colors.bg}
label-mode-background = ${colors.orange-bright}

; Focused workspace
label-focused = %name%
label-focused-background = ${colors.orange-bright}
label-focused-foreground = ${colors.bg}
label-focused-underline = ${colors.yellow-bright}
label-focused-padding = 2

; Unfocused workspace
label-unfocused = %name%
label-unfocused-background = ${colors.bg-alt}
label-unfocused-foreground = ${colors.fg-alt}
label-unfocused-padding = 2

; Visible (on other monitor)
label-visible = %name%
label-visible-background = ${colors.bg-soft}
label-visible-foreground = ${colors.fg}
label-visible-underline = ${colors.blue-bright}
label-visible-padding = 2

; Urgent workspace
label-urgent = %name%
label-urgent-background = ${colors.red-bright}
label-urgent-foreground = ${colors.bg}
label-urgent-padding = 2

; Empty/separator
label-separator =
label-separator-padding = 0

; ======================
;       DATE / TIME
; ======================
[module/date]
type = internal/date
interval = 30

date = %a %b %d
time = %H:%M

label = " %{T1}%date%  %time%%{T-} "
label-foreground = ${colors.fg}
label-background = ${colors.bg}

; ======================
;       CPU
; ======================
[module/cpu]
type = internal/cpu
interval = 3

format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.aqua-bright}
format-background = ${colors.bg-alt}
format-padding = 1

label = "%percentage:2%%"
label-foreground = ${colors.fg}

; ======================
;       MEMORY
; ======================
[module/memory]
type = internal/memory
interval = 5

format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.purple-bright}
format-background = ${colors.bg-alt}
format-padding = 1

label = "%used%/%total%"
label-foreground = ${colors.fg}

; ======================
;       WIFI (wlan0)
; ======================
[module/wlan]
type = internal/network
interface = wlan0
interval = 5

format-connected = <label-connected>
format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.blue-bright}
format-connected-background = ${colors.bg-alt}
format-connected-padding = 1

label-connected = "%essid%"
label-connected-foreground = ${colors.fg}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "  "
format-disconnected-prefix-foreground = ${colors.red-bright}
format-disconnected-background = ${colors.bg-alt}
format-disconnected-padding = 1

label-disconnected = "down"
label-disconnected-foreground = ${colors.fg-alt}

; ======================
;       BRIGHTNESS
; ======================
[module/brightness]
type = custom/script
exec = brightnessctl -m | awk -F, '{print substr($4, 0, length($4)-1)}' 2>/dev/null || echo "N/A"
interval = 3

format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.yellow-bright}
format-background = ${colors.bg-alt}
format-padding = 1

label = "%output%%"
label-foreground = ${colors.fg}

scroll-up = brightnessctl set +5%
scroll-down = brightnessctl set 5%-

; ======================
;       VOLUME (PipeWire / PulseAudio via wpctl)
; ======================
[module/pulseaudio]
type = custom/script
exec = ~/.config/polybar/scripts/volume.sh 2>/dev/null || echo "N/A"
interval = 1
tail = false

format = <label>
format-background = ${colors.bg-alt}
format-padding = 1

label = "%output%"
label-foreground = ${colors.fg}

click-left = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
scroll-up = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

; ======================
;       BATTERY
; ======================
[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98
low-at = 20
poll-interval = 30

; Charging
format-charging = <label-charging>
format-charging-prefix = " "
format-charging-prefix-foreground = ${colors.green-bright}
format-charging-background = ${colors.bg-alt}
format-charging-padding = 1

label-charging = "%percentage%%"
label-charging-foreground = ${colors.fg}

; Discharging
format-discharging = <label-discharging>
format-discharging-prefix = " "
format-discharging-prefix-foreground = ${colors.orange-bright}
format-discharging-background = ${colors.bg-alt}
format-discharging-padding = 1

label-discharging = "%percentage%%"
label-discharging-foreground = ${colors.fg}

; Full
format-full = <label-full>
format-full-prefix = " "
format-full-prefix-foreground = ${colors.green-bright}
format-full-background = ${colors.bg-alt}
format-full-padding = 1

label-full = "Full"
label-full-foreground = ${colors.fg}

; Low battery
format-low = <label-low>
format-low-prefix = " "
format-low-prefix-foreground = ${colors.red-bright}
format-low-background = ${colors.bg-alt}
format-low-padding = 1

label-low = "%percentage%%"
label-low-foreground = ${colors.red-bright}

; ======================
;       POWER BUTTON
; ======================
[module/power]
type = custom/text
content = "  Power"
content-foreground = ${colors.red-bright}
content-background = ${colors.bg-alt}
content-padding = 1
click-left = bash /home/tjc/.local/bin/rofi-power-menu

; ======================
;       PLAYERCTL
; ======================
[module/playerctl]
type = custom/script
exec = playerctl metadata --format "{{artist}} - {{title}}" 2>/dev/null || echo ""
exec-if = playerctl status 2>/dev/null | grep -q Playing
interval = 3
tail = false

format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.green-bright}
format-background = ${colors.bg-alt}
format-padding = 1

label = "%output%"
label-maxlen = 40
label-ellipsis = true
label-foreground = ${colors.fg}

click-left = playerctl play-pause
click-right = playerctl next
click-middle = playerctl previous

; ======================
;       VPN (ProtonVPN)
; ======================
[module/vpn]
type = custom/script
exec = ~/.config/polybar/scripts/vpn.sh 2>/dev/null || echo "󰌿 VPN"
interval = 10
tail = false

format = <label>
format-background = ${colors.bg-alt}
format-foreground = ${colors.fg}
format-padding = 1

label = "%output%"

click-left = ~/.config/polybar/scripts/vpn.sh toggle

; vim:ft=dosini
